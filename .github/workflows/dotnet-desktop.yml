name: .NET Desktop

on: push
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore StopWatch.sln

    - name: Build
      run: dotnet build StopWatch.sln -c ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test StopWatch.sln -c ${{ matrix.configuration }} --no-build --verbosity normal

    - name: Publish application
      if: matrix.configuration == 'Release'
      run: dotnet publish source/StopWatch/StopWatch.csproj -c Release --output source/StopWatch/bin/publish

    - name: Build Installer
      if: matrix.configuration == 'Release'
      run: dotnet build source/StopWatchSetup/StopWatchSetup.wixproj -c Release

    - name: Upload MSI artifact
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: StopWatchSetup-MSI
        path: source/StopWatchSetup/bin/Release/**/*.msi

    - name: Create GitHub Release
      if: matrix.configuration == 'Release' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: source/StopWatchSetup/bin/Release/**/*.msi
        generate_release_notes: true
