---

name: "Build"
run-name: "Build"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build"
    runs-on: windows-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
        dotnet-version:
          - 6.0.x
          - 10.0.x

    env:
      CONFIGURATION: '${{ matrix.configuration }}'
      SOLUTION_NAME: 'StopWatch.sln'
      CSPROJECT_FILE: 'source/StopWatch/StopWatch.csproj'
      SETTINGS_FILE: '.runsettings'
      TEST_LOGGER: 'trx;logfilename=testResults.trx'

    steps:
      - id: checkout
        name: "Checkout"
        uses: actions/checkout@v6

      - id: setup-dotnet
        name: "Setup Dotnet"
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - id: dotnet-restore
        name: "Dotnet Restore"
        run: dotnet restore "$env:SOLUTION_NAME"

      - id: build
        name: "Build"
        run: dotnet build --configuration "$env:CONFIGURATION" --no-restore "$env:SOLUTION_NAME"

      - id: test
        name: "Test"
        run: dotnet test --configuration "$env:CONFIGURATION" --no-restore --no-build --settings "$env:SETTINGS_FILE" --logger "$env:TEST_LOGGER" --logger "console;verbosity=detailed" "$env:SOLUTION_NAME"

      - id: publish
        name: "Publish"
        run: dotnet publish --configuration "$env:CONFIGURATION" --no-restore --no-build "$env:CSPROJECT_FILE" --output publish

      - id: upload-publish-artifact
        name: "Archive Publish"
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ join(matrix.*, '-') }}
          path: publish

      - id: upload-test-artifact
        if: always() && !contains(fromJSON('["cancelled", "skipped"]'), steps.test.outcome)
        name: "Archive Test Results"
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ join(matrix.*, '-') }}
          path: '**/*.trx'
          if-no-files-found: error

  publish-release:
    name: "Publish Release"
    needs: build
    runs-on: ubuntu-slim
    permissions: {}
    steps:

      - name: "Download Publish Artifacts"
        uses: actions/download-artifact@v8
        with:

          # When multiple artifacts are matched, this changes the behavior of the destination directories.
          # If true, the downloaded artifacts will be in the same directory specified by path.
          # If false, the downloaded artifacts will be extracted into individual named directories within the specified path.
          # Note: When downloading a single artifact (by name or ID), it will always be extracted directly to the specified path.
          # Optional. Default is 'false'
          merge-multiple: false # temp?

      - name: "Debugger"
        run: ls -Rl

  publish-test-results:
    if: always() && !contains(fromJSON('["cancelled", "skipped"]'), needs.build.result)
    name: "Publish Tests Results"
    needs: build
    runs-on: ubuntu-slim

    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read

    steps:
      - id: download-test-artifact
        name: "Download Test Results"
        uses: actions/download-artifact@v8
        with:
          pattern: 'test-results-*'
          path: 'test-results'

      - id: publish-test-results
        name: "Publish Test Results"
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          action_fail: true
          time_unit: milliseconds
          files: "test-results/**/*.trx"
